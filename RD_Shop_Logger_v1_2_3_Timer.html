<!doctype html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>R&D Shop Logger</title>
<style>
body{font-family:Arial,sans-serif;background:#eef3f8;margin:0}
.header{background:#123b63;color:#fff;padding:20px;text-align:center}
.container{max-width:900px;margin:auto;padding:20px}
.section{background:#fff;border-radius:12px;padding:18px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.stat{background:#f7f9fc;border-left:5px solid #123b63;padding:12px;border-radius:8px}
input,select,textarea{width:100%;padding:12px;font-size:16px;margin:6px 0;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
button{padding:10px 16px;border:none;border-radius:8px;background:#123b63;color:#fff;margin:4px}
.card{background:#fff;border-left:5px solid #2d7dd2;border-radius:10px;padding:14px;margin:10px 0;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;background:#dde9f7;color:#123b63;font-size:12px;font-weight:bold}.timerbox{background:#f7f9fc;border:2px solid #123b63;border-radius:12px;padding:15px;margin-bottom:18px}.timerdisplay{font-size:36px;font-weight:bold;text-align:center}
</style></head><body><div class='header'><h1>🔧 R&D Shop Logger</h1><div>Engineering & Mold Development</div></div><div class='container'><div class='section'><h2>📊 Dashboard</h2><div class='stats'><div class='stat'><b id='entryCount'>0</b><br>Entries</div><div class='stat'><b id='hourCount'>0</b><br>Total Hours</div><div class='stat'><b id='custCount'>0</b><br>Customers</div><div class='stat'><b id='projCount'>0</b><br>Projects</div></div></div><div class='section'>
<div class='timerbox'><h2>⏱ Smart Job Timer</h2><div>Status: <span id='timerStatus'>Ready</span></div><div><b>Current Job:</b> <span id='currentJob'>None</span></div><div class='timerdisplay' id='timerDisplay'>00:00:00</div><button onclick='startTimer()'>▶ Start</button><button onclick='pauseTimer()'>⏸ Pause</button><button onclick='resumeTimer()'>▶ Resume</button><button onclick='finishTimer()'>⏹ Finish</button><button onclick='resetTimer()'>↺ Reset</button><button onclick='copyHours()'>✓ Copy Time to Hours</button></div><h2>🔧 R&D Shop Logger</h2>

<label>Date</label><input id="d" type="date">
<label>Job/Mold #</label><input id="j">
<label>Customer</label><input id="c">
<label>Project</label><input id="p">
<label>Category</label>
<select id="cat">
<option>Mold Design</option><option>CAD</option><option>CAM</option><option>Machining</option>
<option>Testing</option><option>Prototype</option><option>Process Improvement</option>
</select>
<label>Start Time</label><input id="start" type="time">
<label>End Time</label><input id="end" type="time">
<label>Hours (or leave blank)</label><input id="hrs" type="number" step="0.25">
<label>Voice Notes / Work Performed</label><textarea id="w" rows="5" placeholder="Tap the microphone on your iPhone keyboard to dictate..."></textarea>
 <label>Upload Photo(s)</label>
<input id="photo" type="file" accept="image/*" multiple>

<button onclick="save()">Save</button>
<button onclick="csv()">Export CSV</button>

<div id="entries"></div>

<script>
let db=JSON.parse(localStorage.getItem("rdshop")||"[]");
draw();
let timerSeconds=0,timerHandle=null;function upd(){let h=Math.floor(timerSeconds/3600),m=Math.floor((timerSeconds%3600)/60),s=timerSeconds%60;timerDisplay.textContent=[h,m,s].map(v=>String(v).padStart(2,'0')).join(':');currentJob.textContent=j.value||'None';localStorage.setItem('rdTimer',JSON.stringify({sec:timerSeconds,running:!!timerHandle}));}(()=>{let t=JSON.parse(localStorage.getItem('rdTimer')||'{}');timerSeconds=t.sec||0;upd();if(t.running)startTimer();})();function startTimer(){if(timerHandle)return;timerStatus.textContent='Running';timerHandle=setInterval(()=>{timerSeconds++;upd();},1000);}function pauseTimer(){clearInterval(timerHandle);timerHandle=null;timerStatus.textContent='Paused';upd();}function resumeTimer(){startTimer();}function resetTimer(){pauseTimer();timerSeconds=0;timerStatus.textContent='Ready';upd();}function copyHours(){if(hrs.value&&!confirm('Overwrite Hours?'))return;hrs.value=(timerSeconds/3600).toFixed(2);}function finishTimer(){pauseTimer();copyHours();timerStatus.textContent='Finished';}
function calcHours(){
 if(hrs.value) return hrs.value;
 if(start.value&&end.value){
 let s=start.value.split(":"),e=end.value.split(":");
 let a=+s[0]*60+ +s[1], b=+e[0]*60+ +e[1];
 return ((b-a)/60).toFixed(2);
 }
 return "";
}
function save(){
 db.push({date:d.value,job:j.value,customer:c.value,project:p.value,
 category:cat.value,hours:calcHours(),work:w.value,photo:photo.value});
 localStorage.setItem("rdshop",JSON.stringify(db));
 [d,j,c,p,start,end,hrs,w,photo].forEach(x=>x.value="");
 draw();
}
function draw(){

 entryCount.textContent=db.length;hourCount.textContent=db.reduce((a,r)=>a+(parseFloat(r.hours)||0),0).toFixed(2);custCount.textContent=new Set(db.map(r=>r.customer).filter(Boolean)).size;projCount.textContent=new Set(db.map(r=>r.project).filter(Boolean)).size;entries.innerHTML='<h3>📋 Saved Entries ('+db.length+')</h3>';

 db.slice().reverse().forEach((r,index)=>{

 let realIndex=db.length-1-index;

 entries.innerHTML+=`<div class='card'>
 <b>${r.date}</b> | ${r.job}<br>
 <b>Customer:</b> ${r.customer}<br>
 <b>Project:</b> ${r.project}<br>
 <span class="badge">${r.category}</span> - <b>${r.hours} hrs</b><br><br>
 ${r.work}<br><br>

 <button onclick="viewEntry(${realIndex})">👁 View</button>
 <button onclick="editEntry(${realIndex})">✏️ Edit</button>
 <button onclick="deleteEntry(${realIndex})">🗑 Delete</button>

 </div>`;
 });

}

function deleteEntry(i){
 if(confirm("Delete this entry?")){
   db.splice(i,1);
   localStorage.setItem("rdshop",JSON.stringify(db));
   draw();
 }
}

function editEntry(i){
 let r=db[i];
 d.value=r.date;
 j.value=r.job;
 c.value=r.customer;
 p.value=r.project;
 cat.value=r.category;
 hrs.value=r.hours;
 w.value=r.work;
 db.splice(i,1);
 localStorage.setItem("rdshop",JSON.stringify(db));
 draw();
 window.scrollTo({top:0,behavior:"smooth"});
}

function viewEntry(i){
 let r=db[i];
 modalContent.innerHTML=`
 <b>Date:</b> ${r.date}<br><b>Job:</b> ${r.job}<br>
 <b>Customer:</b> ${r.customer}<br>
 <b>Project:</b> ${r.project}<br>
 <b>Category:</b> ${r.category}<br>
 <b>Hours:</b> ${r.hours}<hr>
 <pre style="white-space:pre-wrap">${r.work}</pre>`;
 viewModal.style.display='block';
}

function closeModal(){viewModal.style.display='none';}

function csv(){
 let rows=[["Date","Job","Customer","Project","Category","Hours","Work","Photo"]];
 db.forEach(r=>rows.push([r.date,r.job,r.customer,r.project,r.category,r.hours,r.work,r.photo]));
 let text=rows.map(x=>x.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(",")).join("\n");
 let blob=new Blob([text],{type:"text/csv"});
 let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="RD_Shop_Log.csv";a.click();
}
</script>

<div id="viewModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6)">
<div style="background:#fff;max-width:700px;margin:40px auto;padding:20px;border-radius:10px">
<h2>R&D Entry</h2><div id="modalContent"></div><br>
<button onclick="closeModal()">Close</button>
</div></div>
</div></body></html>
