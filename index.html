<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>R&D Shop Logger v1.2.3</title><style>
body{font-family:Arial;background:#eef3f8;margin:0}header{background:#123b63;color:#fff;padding:18px;text-align:center}.container{max-width:900px;margin:auto;padding:20px}.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.1)}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}.stat{background:#f6f9fc;border-left:5px solid #123b63;padding:10px;border-radius:8px}input,select,textarea{width:100%;padding:10px;margin:6px 0 12px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}button{background:#123b63;color:#fff;border:none;border-radius:8px;padding:10px 14px;margin:4px}.timer{font-size:42px;text-align:center;font-weight:bold}</style></head>
<body><header><h1>🔧 R&D Shop Logger</h1><div>Engineering & Mold Development</div></header><div class="container">
<div class="card"><h2>📊 Dashboard</h2><div class="stats"><div class="stat"><b id="entries">0</b><br>Entries</div><div class="stat"><b id="hours">0.00</b><br>Total Hours</div></div></div>
<div class="card"><h2>⏱ Job Timer</h2><div class="timer" id="display">00:00:00</div><button onclick="startTimer()">▶ Start</button><button onclick="pauseTimer()">⏸ Pause</button><button onclick="resetTimer()">↺ Reset</button><button onclick="useTime()">✓ Use Time</button></div>
<div class="card"><h2>➕ New Log</h2>
<input id="date" type="date" placeholder="Date"><input id="job" placeholder="Job / Mold #"><input id="customer" placeholder="Customer"><input id="project" placeholder="Project">
<select id="category"><option>Mold Design</option><option>CAD</option><option>CAM</option><option>Machining</option><option>Testing</option><option>Prototype</option><option>Process Improvement</option></select>
<input id="hrs" type="number" step="0.01" placeholder="Hours"><textarea id="notes" rows="4" placeholder="Work performed"></textarea><button onclick="save()">💾 Save</button></div>
<div class="card"><h2>📋 Saved Entries</h2><div id="list"></div></div></div>
<script>
let db=JSON.parse(localStorage.getItem("rdshop")||"[]"),sec=0,timer=null;
function rt(){let h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;display.textContent=[h,m,s].map(v=>String(v).padStart(2,"0")).join(":")}
rt();
function startTimer(){if(timer)return;timer=setInterval(()=>{sec++;rt()},1000)}
function pauseTimer(){clearInterval(timer);timer=null}
function resetTimer(){pauseTimer();sec=0;rt()}
function useTime(){hrs.value=(sec/3600).toFixed(2)}
function draw(){entries.textContent=db.length;hours.textContent=db.reduce((a,r)=>a+(parseFloat(r.hours)||0),0).toFixed(2);list.innerHTML="";db.slice().reverse().forEach((r,i)=>{let idx=db.length-1-i;list.innerHTML+=`<div style='border:1px solid #ddd;padding:10px;border-radius:8px;margin:8px 0'><b>${r.date}</b> | ${r.job}<br>${r.customer} • ${r.project}<br>${r.category} • ${r.hours} hrs<br>${r.notes}<br><button onclick="edit(${idx})">✏ Edit</button><button onclick="del(${idx})">🗑 Delete</button></div>`})}
function save(){db.push({date:date.value,job:job.value,customer:customer.value,project:project.value,category:category.value,hours:hrs.value,notes:notes.value});localStorage.setItem("rdshop",JSON.stringify(db));date.value=job.value=customer.value=project.value=hrs.value=notes.value="";resetTimer();draw()}
function del(i){if(confirm("Delete entry?")){db.splice(i,1);localStorage.setItem("rdshop",JSON.stringify(db));draw()}}
function edit(i){let r=db[i];date.value=r.date;job.value=r.job;customer.value=r.customer;project.value=r.project;category.value=r.category;hrs.value=r.hours;notes.value=r.notes;db.splice(i,1);localStorage.setItem("rdshop",JSON.stringify(db));draw()}
draw();
</script></body></html>
