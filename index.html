<!doctype html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>R&D Shop Logger</title>
<style>
body{font-family:-apple-system,Arial;margin:16px;max-width:760px}
input,select,textarea{width:100%;padding:12px;font-size:16px;margin:6px 0;box-sizing:border-box}
button{padding:12px 16px;font-size:16px;margin:4px}
.card{border:1px solid #ccc;border-radius:8px;padding:10px;margin:8px 0}
</style></head><body>
<h2>🔧 R&D Shop Logger</h2>
<p>Tip: On iPhone, open in Safari → Share → <b>Add to Home Screen</b>.</p>

<label>Date</label><input id="d" type="date">
<label>Job/Mold #</label><input id="j">
<label>Customer</label><input id="c">
<label>Project</label><input id="p">
<label>Category</label>
<select id="cat">
<option>Mold Design</option><option>CAD</option><option>CAM</option><option>Machining</option>
<option>Testing</option><option>Prototype</option><option>Process Improvement</option>
</select>
<label>Start Time</label><input id="start" type="time">
<label>End Time</label><input id="end" type="time">
<label>Hours (or leave blank)</label><input id="hrs" type="number" step="0.25">
<label>Voice Notes / Work Performed</label><textarea id="w" rows="5" placeholder="Tap the microphone on your iPhone keyboard to dictate..."></textarea>
<label>Photo Filename(s)</label><input id="photo" placeholder="IMG_1234.jpg">

<button onclick="save()">Save</button>
<button onclick="csv()">Export CSV</button>

<div id="entries"></div>

<script>
let db=JSON.parse(localStorage.getItem("rdshop")||"[]");
draw();
function calcHours(){
 if(hrs.value) return hrs.value;
 if(start.value&&end.value){
 let s=start.value.split(":"),e=end.value.split(":");
 let a=+s[0]*60+ +s[1], b=+e[0]*60+ +e[1];
 return ((b-a)/60).toFixed(2);
 }
 return "";
}
function save(){
 db.push({date:d.value,job:j.value,customer:c.value,project:p.value,
 category:cat.value,hours:calcHours(),work:w.value,photo:photo.value});
 localStorage.setItem("rdshop",JSON.stringify(db));
 [d,j,c,p,start,end,hrs,w,photo].forEach(x=>x.value="");
 draw();
}
function draw(){
 entries.innerHTML="<h3>Saved Entries ("+db.length+")</h3>";
 db.slice().reverse().forEach(r=>{
 entries.innerHTML+=`<div class='card'><b>${r.date}</b> | ${r.job}<br>${r.project}<br>${r.category} - ${r.hours} hrs<br>${r.work}</div>`;
 });
}
function csv(){
 let rows=[["Date","Job","Customer","Project","Category","Hours","Work","Photo"]];
 db.forEach(r=>rows.push([r.date,r.job,r.customer,r.project,r.category,r.hours,r.work,r.photo]));
 let text=rows.map(x=>x.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(",")).join("\n");
 let blob=new Blob([text],{type:"text/csv"});
 let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="RD_Shop_Log.csv";a.click();
}
</script>
</body></html>
