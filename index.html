<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>R&D Logger</title><style>body{font-family:Arial;max-width:700px;margin:20px auto;padding:16px;background:#f5f5f5}.card{background:#fff;padding:16px;border-radius:10px}input,textarea,select{width:100%;margin:6px 0 12px;padding:8px}button{padding:10px 16px}pre{background:#eee;padding:10px;white-space:pre-wrap}</style></head><body><div class="card"><h1>R&D Logger</h1><input id="project" placeholder="Project"><input id="job" placeholder="Job #"><input id="customer" placeholder="Customer"><select id="status"><option>In Progress</option><option>Completed</option><option>On Hold</option></select><input id="hours" type="number" step="0.1" placeholder="Hours"><textarea id="problem" placeholder="Problem"></textarea><textarea id="work" placeholder="Work Performed"></textarea><textarea id="result" placeholder="Result"></textarea><textarea id="next" placeholder="Next Step"></textarea><button onclick="save()">Save Log</button><pre id="out"></pre></div><script>function save(){const d={project:project.value,job:job.value,customer:customer.value,status:status.value,hours:hours.value,problem:problem.value,work:work.value,result:result.value,next:next.value,date:new Date().toLocaleString()};localStorage.setItem("rdlog",JSON.stringify(d,null,2));out.textContent=localStorage.getItem("rdlog")}out.textContent=localStorage.getItem("rdlog")||"No log saved yet.";</script></body></html>
